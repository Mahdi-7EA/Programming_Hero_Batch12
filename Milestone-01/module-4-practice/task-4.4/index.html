<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>HTML Table</title>
  </head>
  <body>
    <table border="1">
      <caption>
        Weekly Class Schedule
      </caption>
      <thead>
        <tr>
          <th>Day</th>
          <th>9:00-10:00</th>
          <th>10:00-11:00</th>
          <th>11:00-12:00</th>
        </tr>
      </thead>
      <tbody>
        <tr>
          <td>Monday</td>
          <td>Math</td>
          <td>Physics</td>
          <td>Chemistry</td>
        </tr>
        <tr>
          <td>Tuesday</td>
          <td>English</td>
          <td>Biology</td>
          <td>Free</td>
        </tr>
        <tr>
          <td>Wednesday</td>
          <td>Computer</td>
          <td>Math</td>
          <td>Physics</td>
        </tr>
        <tr>
          <td>Thursday</td>
          <td>Chemistry</td>
          <td>English</td>
          <td>Biology</td>
        </tr>
        <tr>
          <td>Friday</td>
          <td colspan="2">Free</td>
          <td >Free</td>
        </tr>
      </tbody>
      <tfoot>
        <tr>
            <td colspan='2'>Total Classes: 8</td>
            <td colspan='2'>Free Periods: 2</td>
        </tr>
      </tfoot>
    </table>
  </body>
</html>
