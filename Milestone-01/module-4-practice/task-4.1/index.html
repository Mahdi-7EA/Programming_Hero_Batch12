<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Multimedia Practice</title>
  </head>
  <body>
    <h1>HTML5 Multimedia</h1>
    <audio controls loop>
      <source src="dirilis_ertugrul.mp3" type="audio/mpeg" />
      Your browser does not support the audio element.
    </audio>
    <br /><br />
    <audio controls>
      <source src="https://www.soundhelix.com/examples/mp3/SoundHelix-Song-1.mp3" type="audio/mpeg" />
      Your browser does not support the audio element.
    </audio>
    <br /><br />
    <video controls width="320">
      <source
        src="https://www.w3schools.com/html/mov_bbb.mp4"
        type="video/mp4"
      />
      Your browser does not support the video element.
    </video>
    <br /><br />
    <iframe
      width="320"
      height="200"
      src="https://www.youtube.com/embed/GDUf8FSrxEk?si=n1-QqYYGrhX_IiPF"
      title="YouTube video player"
      frameborder="0"
      allow="
        accelerometer;
        autoplay;
        clipboard-write;
        encrypted-media;
        gyroscope;
        picture-in-picture;
        web-share;
      "
      referrerpolicy="strict-origin-when-cross-origin"
      allowfullscreen
    ></iframe>
    <p>HTML5 introduces native multimedia support without plugins.</p>
  </body>
</html>
