<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>

        .card {
            width: 250px;
            padding: 20px;
            margin: 20px auto;
            background-color: #f4f4f4;
            border-radius: 10px;
            text-align: center;
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.1);
        }

        .card > img {
            width: 100px;
            height: 100px;
            border-radius: 50%;
        }

        .card > button {
            background: #007BFF;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 5px;
            cursor: pointer;
        }
        body{
            background-color: #e0e0e0;
        }
    </style>
    <title>Business Card</title>
</head>
<body>
    <div class="card">
        <img src="https://randomuser.me/api/portraits/men/9.jpg">
        <h2>John Doe</h2>
        <p>Frontend Developer</p>
        <p>Passionate about creating beautiful websites.</p>
        <button>Hire Me</button>
    </div>
</body>
</html>
